{% extends "admin/admin_base.html" %}

{% block title %}{{ page_title }} | Admin{% endblock %}

{% block admin_content %}
<div class="admin-header">
    <h1 style="margin: 0;">{{ page_title }}</h1>
    <a class="btn" href="{{ url_for('admin_events') }}" style="width: auto; background: #2c3e50;">Back</a>
</div>

<div class="auth-container" style="margin: 1rem auto 0;">
    <form method="POST" action="{{ action_url }}">
        <div class="form-group">
            <label for="event_name">Event Name *</label>
            <input type="text" id="event_name" name="event_name" value="{{ event.event_name|default('', true) }}" required />
        </div>

        <div class="form-group">
            <label for="location">Location *</label>
            <input type="text" id="location" name="location" value="{{ event.location|default('', true) }}" required />
        </div>

        <div class="form-group">
            <label for="event_date">Event Date *</label>
            <input type="date" id="event_date" name="event_date" value="{{ event.event_date.strftime('%Y-%m-%d') if event.event_date else '' }}" required />
        </div>

        <div class="form-group">
            <label for="price">Price (&pound;)</label>
            <input type="number" id="price" name="price" min="0" step="0.01" value="{{ event.price if event.price is not none else '' }}" />
            <small>Leave empty or 0 for free events.</small>
        </div>

        <div class="form-group">
            <label for="event_capacity">Capacity</label>
            <input type="number" id="event_capacity" name="event_capacity" min="1" max="10000" step="1" value="{{ event.event_capacity if event.event_capacity is not none else '' }}" />
            <small>Optional. Leave empty for no set limit.</small>
        </div>

        <div class="form-group">
            <label for="venue_id">Venue *</label>
            <select id="venue_id" name="venue_id" required>
                <option value="">Select a venue</option>
                {% for venue in venues %}
                    <option value="{{ venue.venue_id }}" {% if venue.venue_id == event.venue_id %}selected{% endif %}>
                        {{ venue.venue_name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="category_id">Category *</label>
            <select id="category_id" name="category_id" required>
                <option value="">Select a category</option>
                {% for category in categories %}
                    <option value="{{ category.category_id }}" {% if category.category_id == event.category_id %}selected{% endif %}>
                        {{ category.category_name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div style="display:flex; gap: .75rem; align-items:center; flex-wrap:wrap;">
            <button type="submit" class="btn">{{ submit_label }}</button>
            <a href="{{ url_for('admin_events') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
