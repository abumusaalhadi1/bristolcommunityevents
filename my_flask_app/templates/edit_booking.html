{% extends "layout.html" %}

{% block content %}
<main class="edit-booking">
    <h1>Edit Booking #{{ booking.booking_id }}</h1>
    <p>Event: {{ booking.event_name }} ({{ booking.event_date.strftime('%B %d, %Y') }})</p>
    <p>User: {{ booking.full_name }} ({{ booking.email }})</p>

    <form method="POST">
        <label for="tickets">Tickets</label>
        <input type="number" id="tickets" name="tickets" min="1" max="10" value="{{ booking.tickets }}" required />

        <label>
            <input type="checkbox" name="is_student" {% if booking.is_student %}checked{% endif %} /> Student (10% discount)
        </label>

        <button type="submit">Update Booking</button>
    </form>
</main>
{% endblock %}
