{% extends "layout.html" %}

{% block title %}Login | Bristol Community Events{% endblock %}

{% block content %}
<main class="container">
    <div class="auth-container">
        <h1>Login</h1>
        <p class="auth-copy">Access your bookings, receipts, and account dashboard.</p>

        <div class="auth-tabs">
            <div class="auth-tab active">Login</div>
            <div class="auth-tab">Register</div>
        </div>

        <form id="login-form" method="POST" action="{{ url_for('login') }}">
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}" />
            {% endif %}

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required />
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <form id="register-form" method="POST" action="{{ url_for('register') }}" style="display: none;">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required />
            </div>

            <div class="form-group">
                <label for="email_register">Email</label>
                <input type="email" id="email_register" name="email" required />
            </div>

            <div class="form-group">
                <label for="phone_register">Phone</label>
                <input type="tel" id="phone_register" name="phone" />
            </div>

            <div class="form-group">
                <label for="password_register">Password</label>
                <input type="password" id="password_register" name="password" minlength="8" required />
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" required />
            </div>

            <button type="submit" class="btn">Register</button>
        </form>
    </div>
</main>
{% endblock %}
