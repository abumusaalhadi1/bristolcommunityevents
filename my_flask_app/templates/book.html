{% extends "layout.html" %}

{% block content %}
<main class="booking">
    <h1>Book: {{ event.event_name }}</h1>
    <p>Date: {{ event.event_date.strftime('%B %d, %Y') }}</p>
    <p>Venue: {{ event.venue_name }}</p>
    <p>Price: {{ "?%.2f"|format(event.price) if event.price > 0 else 'Free' }}</p>

    <form method="POST" class="booking-form">
        <label for="full_name">Full Name:</label>
        <input type="text" id="full_name" name="full_name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" />

        <label for="tickets">Number of Tickets:</label>
        <input type="number" id="tickets" name="tickets" min="1" value="1" required />

        <label>
            <input type="checkbox" name="is_student" /> Student (10% discount)
        </label>

        <button type="submit">Confirm Booking</button>
    </form>
</main>
{% endblock %}
